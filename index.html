<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Messenger</title>
    <!-- Фикс для favicon -->
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/style.css">
    <!-- Ethers.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-item active" data-folder="all">
                <span>💬</span><span>Все</span>
            </div>
            <div class="sidebar-item" data-folder="personal">
                <span>👤</span><span>Личное</span>
            </div>
            <div class="sidebar-item" data-folder="news">
                <span>📰</span><span>Новости</span>
            </div>
            <div class="sidebar-item" data-folder="work">
                <span>💼</span><span>Работа</span>
            </div>
            
            <!-- Кнопка Админа (скрыта по умолчанию) -->
            <div class="sidebar-item" id="admin-btn" style="display:none;" onclick="openAdminModal()">
                <span>🛡️</span><span>Админ</span>
            </div>

            <!-- Кнопка Кошелька -->
            <div class="sidebar-item" id="wallet-btn" onclick="connectWallet()" style="margin-top: auto;">
                <span>🦊</span><span>Подключить</span>
            </div>
        </aside>

        <!-- CHAT LIST -->
        <div class="chat-panel">
            <div class="chat-header">
                <div class="search-box">
                    <span>🔍</span><input type="text" placeholder="Search">
                </div>
            </div>
            <div class="chat-list" id="chat-list"></div>
        </div>

        <!-- MAIN CHAT -->
        <main class="chat-area">
            <div class="chat-top-bar">
                <div class="chat-top-avatar" id="chat-avatar">👤</div>
                <div class="chat-top-info">
                    <div class="chat-top-name" id="chat-name">Выберите чат</div>
                    <div class="chat-top-status" id="chat-status">—</div>
                </div>
                <div class="encryption-badge">🔐 E2E</div>
            </div>

            <div class="messages-container" id="messages-container">
                <div class="empty-state" id="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <h3>Добро пожаловать</h3>
                    <p>Подключи кошелек, чтобы начать общение.</p>
                </div>
            </div>

            <div class="input-container">
                <button class="icon-btn">📎</button>
                <div class="input-wrapper">
                    <input type="text" placeholder="Написать сообщение..." disabled id="msg-input">
                    <button class="icon-btn">😊</button>
                </div>
                <button class="send-btn" disabled id="send-btn">➤</button>
            </div>
        </main>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО РЕГИСТРАЦИИ -->
    <div id="reg-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h2>🆔 Регистрация профиля</h2>
            <p>Создай свой ончейн-профиль в Polygon.</p>
            <input type="text" id="reg-username" placeholder="Никнейм (уникальный)">
            <input type="text" id="reg-avatar" placeholder="Avatar CID (Qm...)">
            <textarea id="reg-bio" placeholder="О себе..."></textarea>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeRegModal()">Отмена</button>
                <button class="btn-primary" id="btn-reg" onclick="registerProfile()">Зарегистрировать</button>
            </div>
            <p id="reg-status"></p>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО АДМИНА (KEY ESCROW) -->
    <div id="admin-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content admin-theme">
            <h2>🛡️ Admin Panel: Key Escrow</h2>
            <p>Извлечение зашифрованного ключа пользователя.</p>
            <label>Адрес пользователя:</label>
            <input type="text" id="escrow-address" placeholder="0x...">
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeAdminModal()">Закрыть</button>
                <button class="btn-danger" onclick="accessEscrowKey()">🔓 Получить ключ</button>
            </div>
            <div id="escrow-result" class="result-box"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
