<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web3 Messenger</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
        <div class="sb-top">
            <div id="wallet-btn" class="sb-icon" onclick="connectWallet()" title="Подключить MetaMask">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7h-3a2 2 0 0 1-2-2V3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path><path d="M17 7v14"></path></svg>
            </div>
            <div id="user-avatar-btn" class="sb-icon sb-avatar" style="display:none;" onclick="toggleUserMenu()">
                <div id="user-avatar-circle" class="sb-avatar-circle"></div>
            </div>
        </div>

        <nav class="sb-nav">
            <div class="sb-icon active" data-folder="all" onclick="setFolder('all')" title="Все чаты">...</div>
            <div class="sb-icon" data-folder="personal" onclick="setFolder('personal')" title="Личное">...</div>
            <div class="sb-icon" data-folder="news" onclick="setFolder('news')" title="Новости">...</div>
            <div class="sb-icon" data-folder="work" onclick="setFolder('work')" title="Работа">...</div>
        </nav>

        <div class="sb-bottom">
            <div id="admin-btn" class="sb-icon" onclick="openAdminModal()" title="Админ-панель" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            </div>
            <div class="sb-icon" onclick="openSettingsModal()" title="Настройки">...</div>
        </div>

        <!-- User Dropdown -->
        <div id="user-dropdown-menu" class="user-dropdown hidden">...</div>
    </aside>

    <!-- CHAT LIST + MAIN CHAT + MODALS (оставлены без изменений, кроме мелких правок) -->
    <!-- ... (полный HTML без изменений, кроме добавления id="admin-menu-item" если нужно) -->

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl/1.0.3/nacl.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
