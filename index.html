<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web3 Messenger</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- Left Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-item active">
        <span>💬</span>
        <span>Чаты</span>
        <span class="sidebar-badge">147</span>
      </div>
      <div class="sidebar-item">
        <span>👤</span>
        <span>Личное</span>
      </div>
      <div class="sidebar-item">
        <span>📰</span>
        <span>Новости</span>
        <span class="sidebar-badge">11</span>
      </div>
      <div class="sidebar-item">
        <span>💼</span>
        <span>Работа</span>
        <span class="sidebar-badge">38</span>
      </div>
      <div class="sidebar-item" style="margin-top: auto;">
        <span>💰</span>
        <span>Wallet</span>
      </div>
    </aside>

    <!-- Chat List Panel -->
    <div class="chat-panel">
      <div class="chat-header">
        <div class="search-box">
          <span>🔍</span>
          <input type="text" placeholder="Search">
        </div>
        <div class="chat-tabs">
          <div class="chat-tab active">Все</div>
          <div class="chat-tab">Личное</div>
          <div class="chat-tab">Непрочитанные</div>
        </div>
      </div>
      
      <div class="chat-list">
        <!-- Chats will be rendered here by JavaScript -->
      </div>
    </div>

    <!-- Main Chat Area -->
    <main class="chat-area">
      <div class="chat-top-bar">
        <div class="chat-top-avatar">👤</div>
        <div class="chat-top-info">
          <div class="chat-top-name">Выберите чат</div>
          <div class="chat-top-status">—</div>
        </div>
        <div class="encryption-badge">🔐 E2E</div>
      </div>

      <div class="messages-container">
        <div class="empty-state">
          <div class="empty-state-icon">💬</div>
          <h3>Добро пожаловать в Web3 Messenger</h3>
          <p>Выберите чат слева, чтобы начать общение</p>
        </div>
      </div>

      <div class="input-container">
        <button class="icon-btn">📎</button>
        <div class="input-wrapper">
          <input type="text" placeholder="Написать сообщение..." disabled>
          <button class="icon-btn">😊</button>
        </div>
        <button class="send-btn" disabled>➤</button>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
