<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web3 Messenger</title>
  <link rel="stylesheet" href="css/style.css">
  
  <!-- ✅ Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  
  <!-- ✅ Ethers.js через рабочий CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body>
<div class="app-container">
  <!-- Left Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-item active" data-folder="all">
      <span>💬</span><span>Все</span><span class="sidebar-badge">147</span>
    </div>
    <div class="sidebar-item" data-folder="personal">
      <span>👤</span><span>Личное</span>
    </div>
    <div class="sidebar-item" data-folder="news">
      <span>📰</span><span>Новости</span><span class="sidebar-badge">11</span>
    </div>
    <div class="sidebar-item" data-folder="work">
      <span>💼</span><span>Работа</span><span class="sidebar-badge">38</span>
    </div>
    <!-- ✅ Кнопка с реальной функцией -->
    <div class="sidebar-item" style="margin-top: auto;" id="wallet-btn">
      <span>🦊</span><span id="wallet-text">Подключить</span>
    </div>
  </aside>

  <!-- Chat List Panel -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="search-box">
        <span>🔍</span><input type="text" placeholder="Search" id="search-input">
      </div>
      <div class="chat-tabs">
        <div class="chat-tab active">Все</div>
        <div class="chat-tab">Непрочитанные</div>
        <div class="chat-tab">VIP</div>
      </div>
    </div>
    <div class="chat-list"></div>
  </div>

  <!-- Main Chat Area -->
  <main class="chat-area">
    <div class="chat-top-bar">
      <div class="chat-top-avatar">👤</div>
      <div class="chat-top-info">
        <div class="chat-top-name" id="chat-name">Выберите чат</div>
        <div class="chat-top-status" id="chat-status">—</div>
      </div>
      <div class="encryption-badge">🔐 E2E</div>
    </div>
    <div class="messages-container" id="messages-container">
      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">💬</div>
        <h3>Добро пожаловать в Web3 Messenger</h3>
        <p>Выберите чат слева, чтобы начать общение</p>
        <p style="margin-top:12px;font-size:12px;color:var(--text-muted)">🔒 Все сообщения зашифрованы</p>
      </div>
      <!-- Модальное окно регистрации -->
      <div id="register-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;">
        <div style="background:var(--bg-secondary);padding:24px;border-radius:16px;max-width:420px;width:90%;border:1px solid var(--border)">
          <h3 style="margin-bottom:16px">🆔 Регистрация профиля</h3>
          <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">Создай профиль в блокчейне Polygon. Газ ~$0.02.</p>
          <input type="text" id="reg-username" placeholder="Никнейм (уникальный)" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary)">
          <input type="text" id="reg-avatar" placeholder="Avatar CID (Qm...)" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary)">
          <textarea id="reg-bio" placeholder="О себе" rows="2" style="width:100%;padding:10px;margin-bottom:16px;border-radius:8px;border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);resize:none"></textarea>
          <button id="btn-register" style="width:100%;padding:12px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600">Зарегистрировать в блокчейне</button>
          <p id="reg-status" style="margin-top:12px;font-size:12px;text-align:center;color:var(--text-muted)"></p>
          <button onclick="closeRegisterModal()" style="margin-top:8px;width:100%;padding:8px;background:transparent;color:var(--text-secondary);border:1px solid var(--border);border-radius:8px;cursor:pointer">Отмена</button>
        </div>
      </div>
    </div>
    <div class="input-container">
      <button class="icon-btn" title="Прикрепить">📎</button>
      <div class="input-wrapper">
        <input type="text" placeholder="Выберите чат..." disabled id="msg-input">
        <button class="icon-btn" title="Эмодзи">😊</button>
      </div>
      <button class="send-btn" disabled id="send-btn">➤</button>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
</body>
</html>
