<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web3 Messenger</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
        <div class="sb-top">
            <div id="wallet-btn" class="sb-icon" onclick="connectWallet()" title="Подключить MetaMask">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7h-3a2 2 0 0 1-2-2V3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path><path d="M17 7v14"></path></svg>
            </div>
            <div id="user-avatar-btn" class="sb-icon sb-avatar" style="display:none;" onclick="toggleUserMenu()">
                <div id="user-avatar-circle" class="sb-avatar-circle"></div>
            </div>
        </div>

        <nav class="sb-nav">
            <div class="sb-icon active" data-folder="all" onclick="setFolder('all')" title="Все чаты">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <span id="all-badge" class="sb-badge" style="display:none">0</span>
            </div>
            <div class="sb-icon" data-folder="personal" onclick="setFolder('personal')" title="Личное">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span id="personal-badge" class="sb-badge" style="display:none">0</span>
            </div>
            <div class="sb-icon" data-folder="news" onclick="setFolder('news')" title="Новости">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg>
                <span id="news-badge" class="sb-badge" style="display:none">0</span>
            </div>
            <div class="sb-icon" data-folder="work" onclick="setFolder('work')" title="Работа">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                <span id="work-badge" class="sb-badge" style="display:none">0</span>
            </div>
        </nav>

        <div class="sb-bottom">
            <div id="admin-btn" class="sb-icon" onclick="openAdminModal()" title="Админ-панель" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            </div>
            <div class="sb-icon" onclick="openSettingsModal()" title="Настройки">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </div>
        </div>

        <!-- Dropdown -->
        <div id="user-dropdown-menu" class="user-dropdown hidden">
            <div class="user-dropdown-header">
                <div id="dropdown-avatar-circle" class="user-dropdown-avatar"></div>
                <div>
                    <div id="dropdown-username" class="user-dropdown-name">Аккаунт</div>
                    <div id="dropdown-address" class="user-dropdown-addr">0x...</div>
                </div>
            </div>
            <div class="user-dropdown-divider"></div>
            <div class="user-dropdown-item" onclick="openProfileModal()">Профиль</div>
            <div class="user-dropdown-item" onclick="openContactsModal()">Контакты</div>
            <div class="user-dropdown-item" onclick="openShareModal()">Поделиться</div>
            <div class="user-dropdown-divider"></div>
            <div class="user-dropdown-item danger" onclick="logout()">Выйти</div>
        </div>
    </aside>

    <!-- CHAT LIST PANEL -->
    <section class="chat-panel">
        <div class="chat-panel-header">
            <div id="folder-title" class="chat-panel-title">Все чаты</div>
            <div class="chat-panel-actions">
                <button class="tg-icon-btn" onclick="refreshCurrentChat()" title="Обновить">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                </button>
            </div>
        </div>

        <div class="search-wrap">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" placeholder="Поиск..." oninput="renderChatList()">
            </div>
        </div>

        <div class="add-contact-wrap">
            <input type="text" id="add-contact-input" placeholder="0x... адрес контакта">
            <button class="add-contact-btn" onclick="addContactFromInput()">Добавить</button>
        </div>

        <div class="filter-tabs">
            <div class="filter-tab active" data-tab="all" onclick="setTab('all')">Все</div>
            <div class="filter-tab" data-tab="unread" onclick="setTab('unread')">Непрочитанные</div>
        </div>

        <div id="chat-list" class="chat-list"></div>
    </section>

    <!-- MAIN CHAT AREA -->
    <main class="chat-area">
        <div class="chat-topbar">
            <div class="chat-topbar-info">
                <div id="chat-avatar" class="chat-topbar-avatar"></div>
                <div>
                    <div id="chat-name" class="chat-topbar-name">Выберите чат</div>
                    <div id="chat-status" class="chat-topbar-status offline">был(а) недавно</div>
                </div>
            </div>
            <div class="chat-topbar-actions">
                <div class="enc-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    E2E Encrypted
                </div>
            </div>
        </div>

        <div id="messages-container" class="messages-wrap"></div>

        <div class="input-bar">
            <button class="input-icon-btn" title="Прикрепить файл">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            </button>
            <div class="input-field-wrap">
                <input type="text" id="msg-input" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            </div>
            <button class="input-icon-btn emoji-btn" title="Эмодзи">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
            </button>
            <button id="send-btn" class="send-btn" onclick="sendMessage()" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </main>
</div>

<!-- AUTH MODAL -->
<div id="auth-modal" class="modal" style="display:none;" onclick="closeModalOnBg(event, 'auth-modal')">
    <div class="modal-box">
        <div class="modal-icon blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </div>
        <h3>Локальная защита</h3>
        <p>Введите пароль для расшифровки сообщений на этом устройстве.<br>Этот пароль используется только локально.</p>
        <input type="password" id="auth-password-input" class="input-field" placeholder="Ваш пароль" onkeypress="if(event.key==='Enter') handleAuthSubmit(this.value)">
        <button class="btn-primary" onclick="handleAuthSubmit(document.getElementById('auth-password-input').value)">Войти</button>
        <button class="btn-ghost" onclick="logout()">Отмена</button>
    </div>
</div>

<!-- Toast -->
<div id="toast-container" class="toast-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl/1.0.3/nacl.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
