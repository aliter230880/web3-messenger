<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web3 Messenger</title>
  <link rel="icon" type="image/png" href="logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.5/ethers.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl/1.0.3/nacl.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#0a0e1a] text-white h-screen flex flex-col overflow-hidden">

  <div class="flex flex-1 overflow-hidden">
    <!-- SIDEBAR -->
    <div class="w-16 bg-[#111827] flex flex-col items-center py-6 gap-8 border-r border-white/10">
      <img src="logo.png" alt="ALITERRA" class="w-10 h-10 rounded-2xl">
      <div onclick="switchFolder('all')" class="sidebar-item active flex flex-col items-center cursor-pointer">
        <span class="text-3xl">💬</span>
        <span class="text-xs mt-1">Все</span>
      </div>
      <div onclick="switchFolder('personal')" class="sidebar-item flex flex-col items-center cursor-pointer">
        <span class="text-3xl">👤</span>
        <span class="text-xs mt-1">Личные</span>
      </div>
      <div onclick="switchFolder('work')" class="sidebar-item flex flex-col items-center cursor-pointer">
        <span class="text-3xl">💼</span>
        <span class="text-xs mt-1">Работа</span>
      </div>
      <div onclick="switchFolder('news')" class="sidebar-item flex flex-col items-center cursor-pointer">
        <span class="text-3xl">📢</span>
        <span class="text-xs mt-1">Новости</span>
      </div>
    </div>

    <!-- CHAT LIST -->
    <div class="w-80 bg-[#111827] flex flex-col border-r border-white/10">
      <div class="p-4 flex items-center justify-between border-b border-white/10">
        <h1 class="text-2xl font-bold">Web3 Messenger</h1>
        <button onclick="connectWallet()" id="connectBtn"
          class="px-6 py-2 bg-yellow-400 hover:bg-yellow-300 text-zinc-900 font-semibold rounded-3xl text-sm transition">
          Подключить
        </button>
      </div>

      <div class="p-4">
        <div class="flex gap-2">
          <input id="addContactInput" type="text" placeholder="0x... добавить контакт"
            class="flex-1 bg-[#1f2937] border border-white/10 rounded-2xl px-4 py-3 text-sm focus:outline-none">
          <button onclick="addContact()" class="px-6 bg-white text-zinc-900 rounded-2xl font-medium">Добавить</button>
        </div>
      </div>

      <div class="px-4 pb-4">
        <input id="searchInput" type="text" placeholder="Поиск чатов..."
          class="w-full bg-[#1f2937] border border-white/10 rounded-2xl px-4 py-3 text-sm focus:outline-none">
      </div>

      <div id="chatList" class="flex-1 overflow-y-auto px-3 space-y-1"></div>
    </div>

    <!-- MAIN CHAT -->
    <div class="flex-1 flex flex-col">
      <div id="chatHeader" class="h-14 border-b border-white/10 bg-[#111827] px-6 flex items-center">
        <div id="chatHeaderContent" class="flex-1"></div>
      </div>

      <div id="messagesContainer" class="flex-1 overflow-y-auto p-6 space-y-6 bg-[#0a0e1a]"></div>

      <div class="p-4 border-t border-white/10 bg-[#111827]">
        <div class="flex gap-3">
          <input id="messageInput" type="text" placeholder="Написать сообщение..."
            class="flex-1 bg-[#1f2937] border border-white/10 rounded-3xl px-6 py-4 focus:outline-none"
            onkeypress="if(event.key==='Enter') sendCurrentMessage()">
          <button onclick="sendCurrentMessage()"
            class="px-8 bg-yellow-400 hover:bg-yellow-300 text-zinc-900 rounded-3xl font-semibold transition">➤</button>
        </div>
        <div class="flex items-center justify-center gap-1.5 text-emerald-400 text-xs mt-3">
          <span>🔐</span>
          <span>E2E Encrypted (tweetnacl)</span>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
