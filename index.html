<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web3 Messenger</title>
  <link rel="icon" type="image/png" href="logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.5/ethers.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl/1.0.3/nacl.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-white overflow-hidden">
  <div class="flex h-screen">
    <!-- SIDEBAR -->
    <div id="sidebar" class="w-72 border-r border-white/10 flex flex-col">
      <div class="p-4 border-b border-white/10 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <img src="logo.png" alt="Logo" class="w-9 h-9 rounded-2xl">
          <h1 class="text-2xl font-bold">Web3 Messenger</h1>
        </div>
        <button onclick="connectWallet()" id="connectBtn"
          class="px-4 py-2 bg-yellow-400 text-zinc-900 rounded-2xl text-sm font-semibold">Подключить</button>
      </div>
      <div class="p-3">
        <input id="searchInput" type="text" placeholder="Поиск чатов..."
          class="w-full bg-zinc-900 border border-white/10 rounded-2xl px-4 py-3 text-sm focus:outline-none">
      </div>
      <div id="chatList" class="flex-1 overflow-y-auto px-2"></div>
    </div>

    <!-- CHAT LIST / MAIN AREA -->
    <div class="flex-1 flex flex-col">
      <div id="chatHeader" class="h-14 border-b border-white/10 flex items-center px-6"></div>
      <div id="chatMessages" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
      
      <!-- INPUT -->
      <div class="p-4 border-t border-white/10">
        <div class="flex gap-3">
          <input id="messageInput" type="text" placeholder="Сообщение..." 
            class="flex-1 bg-zinc-900 border border-white/10 rounded-3xl px-6 py-4 focus:outline-none"
            onkeypress="if(event.key==='Enter') sendCurrentMessage()">
          <button onclick="sendCurrentMessage()"
            class="px-8 bg-yellow-400 hover:bg-yellow-300 text-zinc-900 font-semibold rounded-3xl transition">Отправить</button>
        </div>
        <div class="text-[10px] text-emerald-400 flex items-center gap-1 mt-3">
          <span>🔐</span> E2E Encrypted (tweetnacl)
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL (инфо о чате) -->
    <div class="w-80 border-l border-white/10 bg-zinc-900/70 p-4 hidden lg:flex flex-col">
      <div id="chatInfo" class="flex-1"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="hidden fixed bottom-6 right-6 px-6 py-3 rounded-2xl text-sm font-medium"></div>

  <script src="js/app.js"></script>
</body>
</html>
